service: notes-crud-api
frameworkVersion: "4"

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  environment:
    ITEMS_TABLE_NAME: ${self:service}-items-${sls:stage}
    AUTH0_ISSUER_BASE_URL: ${env:AUTH0_ISSUER_BASE_URL}
    AUTH0_AUDIENCE: ${env:AUTH0_AUDIENCE}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt:
                - ItemsTable
                - Arn

functions:
  authorizer:
    handler: src/handlers/authorizer.handler
  createItem:
    handler: src/handlers/createItem.handler
    events:
      - http:
          path: /items
          method: post
          cors: true
          authorizer:
            name: authorizer
            type: token
            identitySource: method.request.header.Authorization
            resultTtlInSeconds: 0
  listItems:
    handler: src/handlers/listItems.handler
    events:
      - http:
          path: /items
          method: get
          cors: true
          authorizer:
            name: authorizer
            type: token
            identitySource: method.request.header.Authorization
            resultTtlInSeconds: 0
  getItem:
    handler: src/handlers/getItem.handler
    events:
      - http:
          path: /items/{id}
          method: get
          cors: true
          authorizer:
            name: authorizer
            type: token
            identitySource: method.request.header.Authorization
            resultTtlInSeconds: 0
  updateItem:
    handler: src/handlers/updateItem.handler
    events:
      - http:
          path: /items/{id}
          method: put
          cors: true
          authorizer:
            name: authorizer
            type: token
            identitySource: method.request.header.Authorization
            resultTtlInSeconds: 0
  deleteItem:
    handler: src/handlers/deleteItem.handler
    events:
      - http:
          path: /items/{id}
          method: delete
          cors: true
          authorizer:
            name: authorizer
            type: token
            identitySource: method.request.header.Authorization
            resultTtlInSeconds: 0

resources:
  Resources:
    ItemsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-items-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
