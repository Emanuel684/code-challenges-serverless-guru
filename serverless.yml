service: notes-crud-api
frameworkVersion: "4"

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  environment:
    ITEMS_TABLE_NAME: ${self:service}-items-${sls:stage}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_ISSUER: ${env:JWT_ISSUER}
    JWT_AUDIENCE: ${env:JWT_AUDIENCE}
    API_CLIENT_ID: ${env:API_CLIENT_ID}
    API_CLIENT_SECRET: ${env:API_CLIENT_SECRET}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt:
                - ItemsTable
                - Arn

functions:
  issueToken:
    handler: src/handlers/issueToken.handler
    events:
      - http:
          path: /auth/token
          method: post
          cors: true
  authorizer:
    handler: src/handlers/authorizer.handler
  createItem:
    handler: src/handlers/createItem.handler
    events:
      - http:
          path: /items
          method: post
          cors: true
          authorizer:
            name: authorizer
            type: token
            identitySource: method.request.header.Authorization
            resultTtlInSeconds: 0
  listItems:
    handler: src/handlers/listItems.handler
    events:
      - http:
          path: /items
          method: get
          cors: true
          authorizer:
            name: authorizer
            type: token
            identitySource: method.request.header.Authorization
            resultTtlInSeconds: 0
  getItem:
    handler: src/handlers/getItem.handler
    events:
      - http:
          path: /items/{id}
          method: get
          cors: true
          authorizer:
            name: authorizer
            type: token
            identitySource: method.request.header.Authorization
            resultTtlInSeconds: 0
  updateItem:
    handler: src/handlers/updateItem.handler
    events:
      - http:
          path: /items/{id}
          method: put
          cors: true
          authorizer:
            name: authorizer
            type: token
            identitySource: method.request.header.Authorization
            resultTtlInSeconds: 0
  deleteItem:
    handler: src/handlers/deleteItem.handler
    events:
      - http:
          path: /items/{id}
          method: delete
          cors: true
          authorizer:
            name: authorizer
            type: token
            identitySource: method.request.header.Authorization
            resultTtlInSeconds: 0

resources:
  Resources:
    ItemsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-items-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
