# Coffee shop menu API — Serverless Framework on AWS
# -----------------------------------------------------------------------------
# Entrypoint: provider + packaging; functions/resources live under infra/*.yml
# Public: POST /auth/token. Protected: /menu-items CRUD (Lambda TOKEN authorizer).
# -----------------------------------------------------------------------------
service: coffee-shop-api
frameworkVersion: "4"

# Smaller per-function zip uploads; excludes dev-only files from bundles.
package:
  individually: true
  patterns:
    - "!.git/**"
    - "!.github/**"
    - "!README.md"
    - "!images/**"
    - "!scripts/**"
    - "!tests/**"
    - "!**/*.test.ts"
    - "!vitest.config.ts"
    - "!coverage/**"
    - "!.env"
    - "!.env.*"
    - "!*.md"

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  environment:
    MENU_ITEMS_TABLE_NAME: ${self:service}-menu-items-${sls:stage}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_ISSUER: ${env:JWT_ISSUER}
    JWT_AUDIENCE: ${env:JWT_AUDIENCE}
    API_CLIENT_ID: ${env:API_CLIENT_ID}
    API_CLIENT_SECRET: ${env:API_CLIENT_SECRET}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt:
                - MenuItemsTable
                - Arn

functions: ${file(infra/functions.yml)}

resources: ${file(infra/resources.dynamodb.yml)}
