# DynamoDB resources for the coffee shop API (composed by root serverless.yml).
#
# Root `serverless.yml` merges this under `resources.Resources`.
# Single-table design: partition key `id` (string) for menu items; name comes from `${self:service}-menu-items-${sls:stage}`.
Resources:
  MenuItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ${self:service}-menu-items-${sls:stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
